services:
  - type: web
    name: shopgenius-backend
    runtime: docker
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://${db_host}:${db_port}/${db_name}
      - key: SPRING_DATASOURCE_USERNAME
        value: ${db_user}
      - key: SPRING_DATASOURCE_PASSWORD
        value: ${db_password}
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: "86400000"
      - key: SPRING_DATA_REDIS_HOST
        fromService:
          name: shopgenius-redis
          type: redis
          property: host
      - key: SPRING_DATA_REDIS_PORT
        fromService:
          name: shopgenius-redis
          type: redis
          property: port
    disk:
      name: app-disk
      mountPath: /data
      sizeGB: 1

  - type: redis
    name: shopgenius-redis
    plan: free
    ipAllowList: []

  - type: web
    name: shopgenius-frontend
    runtime: static
    buildCommand: "node build.js"
    staticPublishPath: frontend
    envVars:
      - key: API_BASE
        fromService:
          name: shopgenius-backend
          type: web
          property: url

databases:
  - name: shopgenius-db
    plan: free
    databaseName: shopgenius
    user: postgres

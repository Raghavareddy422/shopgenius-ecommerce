<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopGenius - Next-Gen Smart E-Commerce</title>
    <meta name="description" content="Shop Electronics, Wearables, Accessories and more. Negotiate real-time prices with our advanced AI Price Negotiation Assistant.">
    <!-- Font Preconnect & Imports -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <!-- Top Navigation Header -->
        <header>
            <div class="header-top">
                <!-- Brand Logo -->
                <a href="#products" class="logo" id="nav-logo">
                    ShopGenius<span>.</span>
                </a>
                
                <!-- Deliver Location -->
                <div class="action-link" style="display: flex; flex-direction: row; align-items: center; gap: 0.5rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="color: var(--secondary);">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    <div style="display: flex; flex-direction: column;">
                        <span class="top-text">Deliver to</span>
                        <span class="bottom-text" id="nav-delivery-country">India</span>
                    </div>
                </div>

                <!-- Central Search Bar -->
                <div class="search-container">
                    <input type="text" id="search-input" class="search-input" placeholder="Search products, brands and categories...">
                    <button class="search-btn" id="search-submit" onclick="triggerSearch()" aria-label="Search">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                </div>

                <!-- Header Actions Menu -->
                <div class="header-actions">
                    <div id="auth-nav-container">
                        <!-- Loaded dynamically -->
                        <a href="#auth" class="action-link">
                            <span class="top-text">Hello, Sign in</span>
                            <span class="bottom-text">Account & Lists</span>
                        </a>
                    </div>
                    
                    <a href="#orders" class="action-link" id="nav-orders-link">
                        <span class="top-text">Returns</span>
                        <span class="bottom-text">& Orders</span>
                    </a>

                    <!-- Alerts Notification Bell -->
                    <div class="action-link" id="nav-notif-container" style="display: none; cursor: pointer; position: relative;" onclick="toggleNotifDropdown()">
                        <div class="cart-icon-container">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                            </svg>
                            <span class="bottom-text">Alerts</span>
                            <span id="notif-badge-container"></span>
                        </div>
                        <div class="notif-dropdown" id="notif-dropdown-panel" onclick="event.stopPropagation()">
                            <div class="notif-header">
                                <span>Notifications</span>
                                <span class="mark-all-read" onclick="markAllNotifAsRead()">Clear</span>
                            </div>
                            <div class="notif-list" id="notif-dropdown-list">
                                <div style="padding:1rem; text-align:center; color:var(--text-secondary); font-size:12px;">No new alerts</div>
                            </div>
                        </div>
                    </div>
                    
                    <a href="#cart" class="action-link" id="nav-cart-link">
                        <div class="cart-icon-container">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                                <circle cx="9" cy="21" r="1"></circle>
                                <circle cx="20" cy="21" r="1"></circle>
                                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                            </svg>
                            <span class="bottom-text">Cart</span>
                            <span id="cart-badge-container"></span>
                        </div>
                    </a>
                </div>
            </div>
            
            <!-- Sub Navigation Menu -->
            <div class="sub-nav">
                <div class="sub-nav-container">
                    <a href="#products" class="sub-nav-link" style="font-weight: 700;">All Products</a>
                    <a href="#products" class="sub-nav-link" onclick="filterByCategory(null)">Shop Categories</a>
                    <a href="#products" class="sub-nav-link" onclick="filterByNegotiationZone()">AI Negotiation Zone</a>
                    <a href="#products" class="sub-nav-link" onclick="filterByBestSellers()">Best Sellers</a>
                    <a href="#products" class="sub-nav-link" onclick="filterBySustainability()">Sustainability Deals</a>
                    <a href="#profile" class="sub-nav-link" id="nav-profile-sublink" style="display: none;">My Profile</a>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main>
            <div id="app-view" class="view-container">
                <!-- Dynamically populated -->
            </div>
        </main>

        <!-- Dynamic Product Details & AI Negotiation Modal -->
        <div class="modal-overlay" id="product-details-modal">
            <div class="modal-content" id="product-details-content">
                <!-- Dynamically populated -->
            </div>
        </div>

        <!-- Address Modal -->
        <div class="modal-overlay" id="address-modal">
            <div class="modal-content glass-card" id="address-modal-content" style="max-width: 500px;">
                <!-- Dynamically populated -->
            </div>
        </div>

        <!-- Toasts Notification -->
        <div id="toast-container" class="toast-container"></div>
    </div>

    <!-- Core Configuration -->
    <script src="config.js" onerror="console.warn('config.js not found, falling back to default API_BASE')"></script>
    <!-- Core Javascript -->
    <script src="app.js"></script>
</body>
</html>
